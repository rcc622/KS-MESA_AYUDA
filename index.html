<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENET Solar — Mesa de Ayuda · Piloto R2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --azul:#1F4E79; --azul-osc:#163A5C; --azul-claro:#EAF2F9;
    --ambar:#F5A623; --verde:#2E9E5B; --rojo:#D64545; --gris:#6B7280;
    --fondo:#F4F6F9; --borde:#E2E8F0; --texto:#1F2937;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
  body{background:var(--fondo);color:var(--texto);font-size:14px}
  .banner{background:var(--azul-osc);color:#fff;padding:8px 16px;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .banner b{color:var(--ambar)}
  .banner button{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px}

  /* LOGIN */
  .login-wrap{max-width:380px;margin:10vh auto;background:#fff;border:1px solid var(--borde);border-radius:14px;padding:30px;text-align:center}
  .login-wrap h1{font-size:20px;color:var(--azul);margin-bottom:4px}
  .login-wrap .sub{font-size:12.5px;color:var(--gris);margin-bottom:20px}
  .login-wrap input{width:100%;padding:11px;border:1px solid var(--borde);border-radius:8px;font-size:14px;margin-bottom:12px}
  .login-wrap .msg{font-size:12.5px;margin-top:12px;color:var(--verde)}

  .tabs{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--borde);padding:0 14px;overflow-x:auto}
  .tab{padding:12px 16px;cursor:pointer;font-size:13.5px;color:var(--gris);border-bottom:3px solid transparent;white-space:nowrap}
  .tab.active{color:var(--azul);font-weight:700;border-bottom-color:var(--ambar)}
  .main{padding:18px;max-width:1340px;margin:0 auto}
  .view{display:none}
  .view.active{display:block}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px;margin-bottom:15px}
  .kpi{background:#fff;border:1px solid var(--borde);border-radius:10px;padding:12px 14px}
  .kpi .v{font-size:22px;font-weight:800}
  .kpi .l{font-size:11.5px;color:var(--gris);margin-top:2px}
  .kpi.rojo .v{color:var(--rojo)} .kpi.ambar .v{color:var(--ambar)} .kpi.verde .v{color:var(--verde)} .kpi.azul .v{color:var(--azul)}

  .pipe-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto}
  .pipe-stage{flex:1;text-align:center;cursor:pointer;border-radius:8px;padding:8px 4px;background:#fff;border:2px solid var(--borde);min-width:80px}
  .pipe-stage.sel{border-color:var(--ambar);background:#FDF3DF}
  .pipe-stage .n{font-size:18px;font-weight:800;color:var(--azul)}
  .pipe-stage .t{font-size:10px;color:var(--gris);margin-top:2px}

  .filtros{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:11px}
  .filtros input,.filtros select{padding:8px 10px;border:1px solid var(--borde);border-radius:8px;font-size:13px;background:#fff}
  .filtros input{width:210px}
  .chk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--gris);cursor:pointer}

  .tabla-wrap{background:#fff;border:1px solid var(--borde);border-radius:10px;overflow:auto}
  table{width:100%;border-collapse:collapse;min-width:980px}
  th{background:var(--azul);color:#fff;font-size:11px;text-transform:uppercase;padding:9px 11px;text-align:left;white-space:nowrap;position:sticky;top:0}
  td{padding:8px 11px;border-bottom:1px solid var(--borde);font-size:12.5px;vertical-align:middle}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--azul-claro)}
  .cc b{display:block} .cc span{font-size:11px;color:var(--gris)}
  .chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .chip.etapa{background:var(--azul-claro);color:var(--azul)}
  .chip.ok{background:#E3F4EA;color:var(--verde)}
  .chip.warn{background:#FDF3DF;color:#9A6700}
  .chip.bad{background:#FBE7E7;color:var(--rojo)}
  .dias{display:inline-flex;align-items:center;gap:5px;font-weight:700;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.verde{background:var(--verde)} .dot.ambar{background:var(--ambar)} .dot.rojo{background:var(--rojo)}
  .val-pend{font-size:10px;background:#EFE9F7;color:#6B4E9B;border-radius:10px;padding:1px 7px;font-weight:700}

  .btn{border:none;border-radius:8px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer}
  .btn.primario{background:var(--azul);color:#fff}
  .btn.fant{background:transparent;color:var(--azul);border:1px solid var(--azul)}
  .btn.mini{padding:5px 10px;font-size:11.5px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  .overlay{position:fixed;inset:0;background:rgba(15,30,50,.45);z-index:80;display:none}
  .overlay.open{display:block}
  .drawer{position:fixed;top:0;right:-580px;width:560px;max-width:96vw;height:100vh;background:#fff;z-index:90;box-shadow:-6px 0 24px rgba(0,0,0,.18);transition:right .25s;overflow-y:auto}
  .drawer.open{right:0}
  .dh{background:var(--azul);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:5}
  .dh h2{font-size:16px}
  .dh .sub{font-size:12px;opacity:.85;margin-top:2px}
  .dh .x{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer}
  .db{padding:16px 20px}
  .sec{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--gris);font-weight:700;margin:16px 0 8px}
  .sec:first-child{margin-top:0}
  .db select,.db input,.db textarea{width:100%;padding:9px;border:1px solid var(--borde);border-radius:8px;font-size:13px;margin-bottom:8px;background:#fff}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .hist-item{font-size:12px;padding:7px 0;border-bottom:1px dashed var(--borde)}
  .hist-item b{color:var(--azul)}
  .hist-item .t{color:var(--gris);font-size:10.5px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--azul-osc);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;box-shadow:0 8px 20px rgba(0,0,0,.3);transition:transform .3s;z-index:120;max-width:92vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .loading{text-align:center;color:var(--gris);padding:30px}

  /* ===== Módulo Instalaciones ===== */
  .isub{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .isub .it{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;border:1px solid var(--borde);color:var(--gris)}
  .isub .it.active{background:var(--azul);color:#fff;border-color:var(--azul)}
  .isub .it .b{display:inline-block;background:var(--rojo);color:#fff;border-radius:10px;font-size:10px;padding:0 6px;margin-left:5px}
  .iview{display:none}.iview.active{display:block}
  .fchip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;border:1px solid var(--borde);color:var(--gris)}
  .fchip.on{background:var(--azul-claro);color:var(--azul);border-color:var(--azul)}
  .prog{height:5px;background:var(--borde);border-radius:3px;overflow:hidden;margin-top:4px}
  .prog>i{display:block;height:100%;background:var(--azul)}
  .clt-card{border-radius:12px;padding:14px 16px;color:#fff;margin-bottom:6px}
  .clt-card .v{font-size:30px;font-weight:800;line-height:1}
  .clt-card.verde{background:linear-gradient(135deg,#2E9E5B,#23804a)}
  .clt-card.ambar{background:linear-gradient(135deg,#F5A623,#d98e12)}
  .clt-card.rojo{background:linear-gradient(135deg,#D64545,#b53333)}
  .tl{list-style:none;margin:4px 0}
  .tl li{position:relative;padding:0 0 12px 22px;font-size:12.5px;color:var(--gris)}
  .tl li::before{content:'';position:absolute;left:4px;top:2px;width:11px;height:11px;border-radius:50%;background:var(--borde);border:2px solid #fff;box-shadow:0 0 0 1px var(--borde)}
  .tl li::after{content:'';position:absolute;left:9px;top:13px;width:1.5px;height:100%;background:var(--borde)}
  .tl li:last-child::after{display:none}
  .tl li.done{color:var(--texto)} .tl li.done::before{background:var(--verde);box-shadow:0 0 0 1px var(--verde)}
  .tl li.now{color:var(--azul);font-weight:700} .tl li.now::before{background:var(--ambar);box-shadow:0 0 0 1px var(--ambar)}
  .cki{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--borde);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;user-select:none}
  .cki.on{background:#E3F4EA;border-color:var(--verde)}
  .cki .box{width:18px;height:18px;border-radius:5px;border:2px solid var(--borde);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:#fff}
  .cki.on .box{background:var(--verde);border-color:var(--verde)}
  .load-card{background:#fff;border:1px solid var(--borde);border-radius:10px;padding:12px 14px}
  .load-card .nm{font-weight:700;font-size:13.5px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,30,50,.5);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal-card{background:#fff;border-radius:14px;padding:22px;width:420px;max-width:94vw}
  .modal-card h3{font-size:16px;color:var(--azul);margin-bottom:4px}
  .motivos{display:flex;gap:8px;margin:8px 0}
  .motivos .m{flex:1;text-align:center;padding:9px;border-radius:8px;border:1px solid var(--borde);cursor:pointer;font-size:13px;font-weight:600;color:var(--gris)}
  .motivos .m.on{background:var(--azul-claro);border-color:var(--azul);color:var(--azul)}
</style>
</head>
<body>

<!-- ====== CONFIGURACIÓN — pegar credenciales de Supabase aquí ====== -->
<script>
  const SUPABASE_URL = "https://sferngpbfbihfcnhcbno.supabase.co";
  // Publishable key (formato nuevo de Supabase). La seguridad real la pone RLS + registro cerrado.
  const SUPABASE_ANON_KEY = "sb_publishable_BIjyD2fjTCcDBm757LQ2xA_OpL-Wzkd";
</script>

<div id="app"></div>
<div class="overlay" id="overlay" onclick="cerrarDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg" onclick="cerrarModal(event)"><div class="modal-card" id="modalCard" onclick="event.stopPropagation()"></div></div>

<script>
if(SUPABASE_URL.startsWith('PEGA_AQUI') || SUPABASE_ANON_KEY.startsWith('PEGA_AQUI')){
  document.getElementById('app').innerHTML = `
    <div class="login-wrap">
      <h1>KENET <span style="color:#F5A623">SOLAR</span></h1>
      <div class="sub">Mesa de Ayuda · Piloto R2</div>
      <div style="text-align:left;font-size:13px;background:#FDF3DF;border-radius:10px;padding:14px;line-height:1.6">
        ⚙ <b>Falta configurar las credenciales.</b><br>
        1. Abre <b>index.html</b> con Bloc de notas<br>
        2. Pega tu <b>SUPABASE_URL</b> y <b>SUPABASE_ANON_KEY</b> en las primeras líneas<br>
        3. Guarda y vuelve a subir a Netlify<br><br>
        Detalle completo en <b>GUIA_DEPLOY_MVP.md</b> (Paso 4).
      </div>
    </div>`;
  throw new Error('Configura SUPABASE_URL y SUPABASE_ANON_KEY (ver GUIA_DEPLOY_MVP.md)');
}
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);
let USER = null, ETAPAS = [], COBROS = [], DATA = [], filtroEtapa = null;

function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),3500); }

/* ============ AUTH ============ */
async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){ USER = session.user; await cargarApp(); }
  else renderLogin();
  sb.auth.onAuthStateChange(async (ev, s) => {
    if(ev==='SIGNED_IN' && s){ USER = s.user; await cargarApp(); }
    if(ev==='SIGNED_OUT'){ USER = null; renderLogin(); }
  });
}
function renderLogin(){
  $('app').innerHTML = `
    <div class="login-wrap">
      <h1>KENET <span style="color:var(--ambar)">SOLAR</span></h1>
      <div class="sub">Mesa de Ayuda · Piloto R2<br>Acceso solo para usuarios autorizados (los gestiona GO)</div>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="username">
      <input type="password" id="pass" placeholder="contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      <button class="btn primario" style="width:100%" onclick="login()">Entrar</button>
      <div class="msg" id="loginMsg"></div>
    </div>`;
}
async function login(){
  const email = $('email').value.trim().toLowerCase();
  const password = $('pass').value;
  if(!email || !password) return;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  $('loginMsg').textContent = error ? 'Correo o contraseña incorrectos.' : '';
}
async function logout(){ await sb.auth.signOut(); }

/* ============ CARGA ============ */
async function cargarApp(){
  $('app').innerHTML = `
    <div class="banner">
      <span>🗼 <b>MESA DE AYUDA</b> · Piloto R2 (TRC + MVA) · Línea 1 Implementación</span>
      <span>${USER.email} &nbsp;<button onclick="logout()">Salir</button></span>
    </div>
    <div class="tabs">
      <div class="tab active" data-v="journey" onclick="verTab(this)">🛠 Journey R2</div>
      <div class="tab" data-v="inst" onclick="verTab(this)">🔧 Instalaciones</div>
      <div class="tab" data-v="go" onclick="verTab(this)">🎛 Tablero GO</div>
      <div class="tab" data-v="bitacora" onclick="verTab(this)">📜 Bitácora</div>
    </div>
    <div class="main">
      <section class="view active" id="v-journey">
        <div class="kpis" id="kpis"></div>
        <div class="pipe-row" id="pipe"></div>
        <div class="filtros">
          <input id="fq" placeholder="🔍 Buscar cliente / OV / folio…" oninput="renderTabla()">
          <select id="fz" onchange="renderTabla()"><option value="">TRC + MVA</option><option>TRC</option><option>MVA</option></select>
          <label class="chk"><input type="checkbox" id="fr" onchange="renderTabla()"> Solo OLA vencido</label>
          <label class="chk"><input type="checkbox" id="fv" onchange="renderTabla()"> Solo por validar</label>
          <label class="chk"><input type="checkbox" id="fh" onchange="cargarDatos()"> Incluir histórico</label>
          <span style="font-size:12px;color:var(--gris)" id="fc"></span>
        </div>
        <div class="tabla-wrap"><table>
          <thead><tr><th>Folio</th><th>Cliente</th><th>Zona</th><th>Etapa</th><th>Días vs OLA</th><th>Cobro</th><th>Próxima acción</th><th>OV</th></tr></thead>
          <tbody id="tb"><tr><td colspan="8" class="loading">Cargando…</td></tr></tbody>
        </table></div>
      </section>
      <section class="view" id="v-go">
        <div class="kpis" id="kpisGo"></div>
        <div class="tabla-wrap"><table style="min-width:500px">
          <thead><tr><th>Etapa</th><th>Clientes</th><th>OLA vencido</th><th>Promedio días</th></tr></thead>
          <tbody id="tbGo"></tbody>
        </table></div>
      </section>
      <section class="view" id="v-bitacora">
        <div class="tabla-wrap"><table style="min-width:700px">
          <thead><tr><th>Cuándo</th><th>Quién</th><th>Cliente</th><th>Campo</th><th>Antes</th><th>Después</th></tr></thead>
          <tbody id="tbBit"><tr><td colspan="6" class="loading">Cargando…</td></tr></tbody>
        </table></div>
      </section>
      <section class="view" id="v-inst">
        <div class="isub">
          <div class="it active" data-iv="pipeline" onclick="verInst(this)">📋 Pipeline</div>
          <div class="it" data-iv="agenda" onclick="verInst(this)">📅 Agenda</div>
          <div class="it" data-iv="pmd2" onclick="verInst(this)">📝 PMD-P2 Reportes <span class="b" id="iPmdBadge" style="display:none"></span></div>
          <div class="it" data-iv="metrics" onclick="verInst(this)">📈 Métricas</div>
        </div>
        <div class="iview active" id="iv-pipeline">
          <div class="kpis" id="iKpis"></div>
          <div class="filtros">
            <input id="iq" placeholder="🔍 Buscar cliente / folio…" oninput="renderInstTabla()">
            <span id="iFiltros" style="display:flex;gap:7px;flex-wrap:wrap"></span>
            <select id="iz" onchange="renderInstTabla()"><option value="">Todas las zonas</option><option>TRC</option><option>MVA</option><option>MTY</option><option>SLT</option></select>
            <select id="iInstaladorF" onchange="renderInstTabla()"><option value="">Todos los instaladores</option></select>
            <span style="font-size:12px;color:var(--gris)" id="iCount"></span>
          </div>
          <div class="tabla-wrap"><table>
            <thead><tr><th></th><th>Cliente</th><th>Etapa</th><th>Instalador</th><th>F. Inst.</th><th>Próxima acción</th><th>Compromiso</th><th>Pan.</th><th>CLT</th><th></th></tr></thead>
            <tbody id="iTb"><tr><td colspan="10" class="loading">Cargando…</td></tr></tbody>
          </table></div>
        </div>
        <div class="iview" id="iv-agenda"></div>
        <div class="iview" id="iv-pmd2">
          <div class="tabla-wrap"><table style="min-width:900px">
            <thead><tr><th>Instalador</th><th>Cliente</th><th>F. Inst.</th><th>¿Reporte?</th><th>¿A tiempo?</th><th>Pend.</th><th>Pago</th><th></th></tr></thead>
            <tbody id="iRep"><tr><td colspan="8" class="loading">Cargando…</td></tr></tbody>
          </table></div>
        </div>
        <div class="iview" id="iv-metrics"></div>
      </section>
    </div>`;
  const [e, c] = await Promise.all([
    sb.from('etapas').select('*').order('orden'),
    sb.from('cobro_estados').select('*')
  ]);
  ETAPAS = e.data || []; COBROS = c.data || [];
  await cargarDatos();
}
function verTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  $('v-'+el.dataset.v).classList.add('active');
  if(el.dataset.v==='bitacora') cargarBitacora();
  if(el.dataset.v==='go') renderGo();
  if(el.dataset.v==='inst') cargarInstalaciones();
}
async function cargarDatos(){
  let q = sb.from('v_journey').select('*').order('dias_en_etapa', { ascending: false });
  if(!($('fh') && $('fh').checked)) q = q.eq('activo', true);
  const { data, error } = await q;
  if(error){ toast('Error cargando: '+error.message); return; }
  DATA = data || [];
  renderKpis(); renderPipe(); renderTabla(); renderGo();
}

/* ============ RENDER JOURNEY ============ */
function renderKpis(){
  const act = DATA.filter(c=>c.activo);
  const rojo = act.filter(c=>c.semaforo==='rojo').length;
  const ambar = act.filter(c=>c.semaforo==='ambar').length;
  const cob = act.filter(c=>c.cobro_sem==='bad').length;
  const pv = act.filter(c=>!c.etapa_validada).length;
  $('kpis').innerHTML = `
    <div class="kpi azul"><div class="v">${act.length}</div><div class="l">Obras activas R2</div></div>
    <div class="kpi rojo"><div class="v">${rojo}</div><div class="l">OLA vencido</div></div>
    <div class="kpi ambar"><div class="v">${ambar}</div><div class="l">En riesgo</div></div>
    <div class="kpi rojo"><div class="v">${cob}</div><div class="l">Cobro vencido/retenido</div></div>
    <div class="kpi ambar"><div class="v">${pv}</div><div class="l">Etapa por validar</div></div>`;
}
function renderPipe(){
  const act = DATA.filter(c=>c.activo);
  $('pipe').innerHTML = ETAPAS.map(e=>{
    const n = act.filter(c=>c.etapa_actual===e.id).length;
    return `<div class="pipe-stage ${filtroEtapa===e.id?'sel':''}" onclick="togglePipe(${e.id})">
      <div class="n">${n}</div><div class="t">${e.corto}</div></div>`;
  }).join('');
}
function togglePipe(id){ filtroEtapa = filtroEtapa===id?null:id; renderPipe(); renderTabla(); }
function renderTabla(){
  const q = ($('fq').value||'').toLowerCase();
  const z = $('fz').value, soloR = $('fr').checked, soloV = $('fv').checked;
  const rows = DATA.filter(c=>{
    if(q && !((c.nombre+c.orden_venta+c.folio+c.factura_folio).toLowerCase().includes(q))) return false;
    if(z && c.zona!==z) return false;
    if(soloR && c.semaforo!=='rojo') return false;
    if(soloV && c.etapa_validada) return false;
    if(filtroEtapa!==null && c.etapa_actual!==filtroEtapa) return false;
    return true;
  });
  $('fc').textContent = rows.length + ' de ' + DATA.length;
  $('tb').innerHTML = rows.map(c=>`
    <tr onclick="abrir(${c.id})">

async function guardar(id){
  const upd = {
    etapa_actual: parseInt($('dEtapa').value),
    cobro_estado: $('dCobro').value,
    proxima_accion: $('dAccion').value.trim(),
    responsable: $('dResp').value.trim(),
    etapa_validada: true
  };
  const { error } = await sb.from('clientes').update(upd).eq('id', id);
  if(error){ toast('⛔ '+error.message); return; }
  const nota = $('dNota').value.trim();
  if(nota) await sb.from('eventos').insert({ cliente_id: id, tipo: 'nota', descripcion: nota, usuario: USER.email });
  toast('✅ Guardado — el tablero y la bitácora ya lo reflejan.');
  cerrarDrawer(); await cargarDatos();
}
async function archivar(id, activo){
  const { error } = await sb.from('clientes').update({ activo: !activo }).eq('id', id);
  if(error){ toast('⛔ '+error.message); return; }
  toast(activo ? '📦 Archivado — sale de la vista activa (no se borra nada).' : '↩ Reactivado.');
  cerrarDrawer(); await cargarDatos();
}

/* ============ MÓDULO INSTALACIONES (detalle de la etapa 2 del journey) ============ */
let INST=[], INSTALADORES=[], IETAPAS=[], REPORTES=[], instSec='pipeline', iFilter='all', modalInstId=null, modalMotivo='Cliente';

const ICHIPS=[
  {k:'all',     t:'Todos',     f:()=>true},
  {k:'exceeded',t:'Excedidos', f:r=>r.clt!=null&&Number(r.clt)>=1.2},
  {k:'risk',    t:'En riesgo', f:r=>r.clt!=null&&Number(r.clt)>=1.0&&Number(r.clt)<1.2},
  {k:'ok',      t:'A tiempo',  f:r=>r.clt!=null&&Number(r.clt)<1.0},
];
const cltColor = c => c==null?'verde':(Number(c)>=1.2?'rojo':(Number(c)>=1.0?'ambar':'verde'));
const fdate = d => d? new Date(d+'T00:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'}) : '—';
function instEstado(r){
  if(r.reag_motivo) return {t:'Reagendado — '+r.reag_motivo, c:'warn'};
  if(r.clt!=null&&Number(r.clt)>=1.2) return {t:'CLT excedido', c:'bad'};
  if(r.clt!=null&&Number(r.clt)>=1.0) return {t:'En riesgo', c:'warn'};
  if(r.etapa_inst>=10) return {t:'Instalado', c:'ok'};
  return {t:'En proceso', c:'etapa'};
}

async function cargarInstalaciones(){
  const [vi, ins, et, rep] = await Promise.all([
    sb.from('v_instalaciones').select('*'),
    sb.from('instaladores').select('*').order('nombre'),
    sb.from('instalacion_etapas').select('*').order('orden'),
    sb.from('reportes_instalacion').select('*')
  ]);
  if(vi.error){ toast('Error instalaciones: '+vi.error.message); return; }
  INST = vi.data||[]; INSTALADORES = ins.data||[]; IETAPAS = et.data||[]; REPORTES = rep.data||[];
  const sel=$('iInstaladorF');
  if(sel) sel.innerHTML='<option value="">Todos los instaladores</option>'+INSTALADORES.map(i=>`<option value="${i.id}">${i.nombre}</option>`).join('');
  const pend = REPORTES.filter(r=>r.enviado && !r.pago_liberado).length;
  const badge=$('iPmdBadge'); if(badge){ badge.style.display=pend?'inline-block':'none'; badge.textContent=pend; }
  renderInstKpis(); renderInstFiltros(); renderInstTabla(); renderAgenda(); renderReportes(); renderMetrics();
}

/* ----- Pipeline ----- */
function renderInstKpis(){
  const act=INST.filter(r=>r.activo);
  const exc=act.filter(r=>r.clt!=null&&Number(r.clt)>=1.2).length;
  const risk=act.filter(r=>r.clt!=null&&Number(r.clt)>=1.0&&Number(r.clt)<1.2).length;
  const clts=act.filter(r=>r.clt!=null).map(r=>Number(r.clt));
  const prom=clts.length?(clts.reduce((s,c)=>s+c,0)/clts.length):0;
  $('iKpis').innerHTML=`
    <div class="kpi azul"><div class="v">${act.length}</div><div class="l">Instalaciones activas</div></div>
    <div class="kpi rojo"><div class="v">${exc}</div><div class="l">CLT excedido</div></div>
    <div class="kpi ambar"><div class="v">${risk}</div><div class="l">En riesgo</div></div>
    <div class="kpi ${cltColor(prom)}"><div class="v">${prom.toFixed(2)}</div><div class="l">CLT promedio</div></div>`;
}
function renderInstFiltros(){
  $('iFiltros').innerHTML=ICHIPS.map(c=>{
    const n=INST.filter(r=>r.activo).filter(c.f).length;
    return `<span class="fchip ${iFilter===c.k?'on':''}" onclick="setIFilter('${c.k}')">${c.t} (${n})</span>`;
  }).join('');
}
function setIFilter(k){ iFilter=k; renderInstFiltros(); renderInstTabla(); }
function instFiltradas(){
  const q=($('iq')?.value||'').toLowerCase(), z=$('iz')?.value||'', inst=$('iInstaladorF')?.value||'';
  const chip=ICHIPS.find(c=>c.k===iFilter).f;
  return INST.filter(r=>r.activo).filter(chip).filter(r=>{
    if(q && !(((r.cliente_nombre||'')+(r.folio||'')).toLowerCase().includes(q))) return false;
    if(z && r.zona!==z) return false;
    if(inst && String(r.instalador_id)!==inst) return false;
    return true;
  });
}
function renderInstTabla(){
  const rows=instFiltradas().sort((a,b)=>(Number(b.clt)||0)-(Number(a.clt)||0));
  if($('iCount')) $('iCount').textContent=rows.length+' de '+INST.filter(r=>r.activo).length;
  $('iTb').innerHTML=rows.map(r=>{
    const prog=Math.round((r.etapa_inst/10)*100);
    return `<tr onclick="abrirInst(${r.id})">
      <td><span class="dot ${r.clt_sem}"></span></td>

      <td style="min-width:130px"><span style="font-size:12px">${r.etapa_nombre||''}</span><div class="prog"><i style="width:${prog}%"></i></div><span style="font-size:10px;color:var(--gris)">${r.etapa_inst}/10</span></td>
      <td>${r.instalador_nombre||'—'}</td>
      <td style="white-space:nowrap">${fdate(r.fecha_inst)}</td>
      <td style="max-width:180px;font-size:12px">${r.proxima_accion||'<span style="color:var(--gris)">—</span>'}</td>
      <td style="white-space:nowrap">${fdate(r.fecha_compromiso)}</td>
      <td>${r.paneles||0}</td>
      <td><span class="dias"><span class="dot ${r.clt_sem}"></span>${r.clt!=null?Number(r.clt).toFixed(2):'—'}</span></td>
      <td onclick="event.stopPropagation()"><button class="btn fant mini" title="Reagendar" onclick="abrirModal(${r.id})">↺</button></td>
    </tr>`;
  }).join('')||'<tr><td colspan="10" class="loading">Sin resultados</td></tr>';
}

async function toggleCl(id,campo,el){

function repBadges(r){
  const env = r.enviado?'<span class="chip ok">✓ Enviado</span>':'<span class="chip bad">✗ No enviado</span>';
  const at = r.a_tiempo===true?'<span class="chip ok">✓ A tiempo</span>':(r.a_tiempo===false?'<span class="chip bad">✗ Con retraso</span>':'<span class="chip" style="background:#eee;color:#888">— N/A</span>');
  const pago = r.pago_liberado?'<span class="chip ok">✓ Liberado</span>':(r.enviado?'<span class="chip warn">Pendiente</span>':'<span class="chip bad">Bloqueado</span>');

function renderReportes(){
  $('iRep').innerHTML=REPORTES.map(rp=>{

function abrirReporte(id){
  const rp=REPORTES.find(x=>x.id===id); if(!rp) return;
  const ins=INST.find(i=>i.id===rp.instalacion_id)||{};
  const vals=[['val_reporte','Reporte recibido'],['val_evidencias','Evidencias validadas'],['val_monitoreo','Monitoreo verificado'],['val_pago','Pago liberado']];
  const done=vals.filter(([k])=>rp[k]).length;
  const b=repBadges(rp);
  $('drawer').innerHTML=`
    <div class="dh"><button class="x" onclick="cerrarDrawer()">✕</button>
      <h2>${ins.cliente_nombre||'—'}</h2>
      <div class="sub">${ins.instalador_nombre||''} · ${fdate(ins.fecha_inst)} &nbsp; ${b.env} ${b.at}</div>
    </div>
    <div class="db">
      <div class="sec">Datos del reporte</div>
      <div class="grid2">
        <div style="font-size:12.5px">Paneles<br><b>${rp.paneles||0}</b></div>
        <div style="font-size:12.5px">Checklist 6 pts<br><b>${rp.checklist_6||'—'}</b></div>
        <div style="font-size:12.5px">Panel<br><b>${rp.modelo||'—'}</b></div>
        <div style="font-size:12.5px">Inversor<br><b>${rp.inversor||'—'}</b></div>
      </div>
      <div class="sec">Validación PM (${done}/4)</div>
      ${vals.map(([k,lab])=>`<div class="cki ${rp[k]?'on':''}" onclick="toggleVal(${rp.id},'${k}',this)"><span class="box">${rp[k]?'✓':''}</span>${lab}</div>`).join('')}
      <div class="sec">Liberación de pago</div>
      ${rp.pago_liberado
        ? '<div class="clt-card verde" style="text-align:center"><div class="v" style="font-size:18px">✓ Pago liberado</div></div>'
        : `<button class="btn primario" ${done<4?'disabled':''} onclick="liberarPago(${rp.id})" style="width:100%">${done<4?'Completa los '+(4-done)+' ítems restantes':'Liberar pago'}</button>
           <div style="font-size:11px;color:var(--gris);margin-top:6px">El candado exige los 4 ítems de validación. Queda registrado en la bitácora.</div>`}
    </div>`;
  $('overlay').classList.add('open'); $('drawer').classList.add('open');
}
async function toggleVal(id,campo,el){
  const on=!el.classList.contains('on');
  const {error}=await sb.from('reportes_instalacion').update({[campo]:on}).eq('id',id);
  if(error){ toast('⛔ '+error.message); return; }
  const rp=REPORTES.find(x=>x.id===id); if(rp) rp[campo]=on;
  abrirReporte(id);
}
async function liberarPago(id){
  const rp=REPORTES.find(x=>x.id===id);
  const done=['val_reporte','val_evidencias','val_monitoreo','val_pago'].filter(k=>rp[k]).length;
  if(done<4){ toast('Faltan ítems de validación.'); return; }
  const {error}=await sb.from('reportes_instalacion').update({pago_liberado:true}).eq('id',id);
  if(error){ toast('⛔ '+error.message); return; }
  toast('✅ Pago liberado (registrado en bitácora).'); await cargarInstalaciones(); abrirReporte(id);
}

/* ----- Agenda ----- */
function renderAgenda(){
  const act=INST.filter(r=>r.activo);
  const porInst=INSTALADORES.map(ins=>{
    const items=act.filter(r=>r.instalador_id===ins.id);
    return {ins, items, pan:items.reduce((s,r)=>s+(r.paneles||0),0)};
  });
  const maxPan=Math.max(1,...porInst.map(p=>p.pan));
  const prox=act.filter(r=>r.fecha_inst).sort((a,b)=>new Date(a.fecha_inst)-new Date(b.fecha_inst));
  $('iv-agenda').innerHTML=`
    <div class="sec" style="margin-top:0">Carga por instalador</div>
    <div class="kpis">${porInst.map(p=>`
      <div class="load-card">
        <div class="nm">${p.ins.nombre} <span style="font-size:11px;color:var(--gris)">${p.ins.zona||''}</span></div>
        <div style="font-size:20px;font-weight:800;color:var(--azul)">${p.pan} <span style="font-size:11px;color:var(--gris)">paneles</span></div>
        <div class="prog"><i style="width:${Math.round(p.pan/maxPan*100)}%"></i></div>
        <div style="font-size:11px;color:var(--gris);margin-top:3px">${p.items.length} instalación(es)</div>
      </div>`).join('')||'<div class="loading">Sin instaladores</div>'}</div>
    <div class="sec">Próximas instalaciones</div>
    <div class="tabla-wrap"><table style="min-width:600px">
      <thead><tr><th>Fecha</th><th>Cliente</th><th>Instalador</th><th>Paneles</th><th>Estado</th></tr></thead>
      <tbody>${prox.map(r=>{const e=instEstado(r);return `<tr onclick="abrirInst(${r.id})">
        <td style="white-space:nowrap"><b>${fdate(r.fecha_inst)}</b></td>
        <td>${r.cliente_nombre||'—'}</td><td>${r.instalador_nombre||'—'}</td>
        <td>${r.paneles||0}</td><td><span class="chip ${e.c}">${e.t}</span></td></tr>`;}).join('')
        ||'<tr><td colspan="5" class="loading">Sin instalaciones programadas</td></tr>'}</tbody>
    </table></div>`;
}

/* ----- Métricas ----- */
function renderMetrics(){
  const act=INST.filter(r=>r.activo);
  const clts=act.filter(r=>r.clt!=null).map(r=>Number(r.clt));
  const prom=clts.length?(clts.reduce((s,c)=>s+c,0)/clts.length):0;
  const comp=INST.filter(r=>r.etapa_inst>=10).length;
  const repEnv=REPORTES.filter(r=>r.enviado).length;
  const repAt=REPORTES.filter(r=>r.a_tiempo===true).length;
  const pctAt=repEnv?Math.round(repAt/repEnv*100):0;
  const filas=INSTALADORES.map(ins=>{
    const items=INST.filter(r=>r.instalador_id===ins.id);
    const ic=items.filter(r=>r.clt!=null).map(r=>Number(r.clt));
    const cprom=ic.length?(ic.reduce((s,c)=>s+c,0)/ic.length):0;
    const reps=REPORTES.filter(r=>r.instalador_id===ins.id);
    const env=reps.filter(r=>r.enviado).length, at=reps.filter(r=>r.a_tiempo===true).length;
    return {ins, n:items.length, cprom, pct:env?Math.round(at/env*100):0};
  });
  $('iv-metrics').innerHTML=`
    <div class="kpis">
      <div class="kpi ${cltColor(prom)}"><div class="v">${prom.toFixed(2)}</div><div class="l">CLT promedio</div></div>
      <div class="kpi azul"><div class="v">${act.length}</div><div class="l">Activas</div></div>
      <div class="kpi verde"><div class="v">${comp}</div><div class="l">Completadas</div></div>
      <div class="kpi ambar"><div class="v">${pctAt}%</div><div class="l">Reportes a tiempo</div></div>
    </div>
    <div class="sec">Desempeño por instalador</div>
    <div class="tabla-wrap"><table style="min-width:520px">
      <thead><tr><th>Instalador</th><th>Instalaciones</th><th>% Reportes a tiempo</th><th>CLT prom.</th></tr></thead>
      <tbody>${filas.map(f=>`<tr>
        <td><b>${f.ins.nombre}</b></td><td>${f.n}</td>
        <td><div style="display:flex;align-items:center;gap:8px">${f.pct}%<div class="prog" style="flex:1"><i style="width:${f.pct}%"></i></div></div></td>
        <td><span class="dias"><span class="dot ${cltColor(f.cprom)}"></span>${f.cprom.toFixed(2)}</span></td></tr>`).join('')
        ||'<tr><td colspan="4" class="loading">Sin instaladores</td></tr>'}</tbody>
    </table></div>`;
}

init();
</script>
</body>
</html>
