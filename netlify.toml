# Netlify — el repo ya está conectado: cada push a la rama de producción publica.
# IMPORTANTE: solo se publica index.html (la app). Así sql/ y docs/ (esquema,
# gestión de usuarios, contexto de negocio) NO quedan accesibles en la web pública,
# aunque vivan en el repo privado.
[build]
  command = "mkdir -p dist && cp index.html dist/index.html"
  publish = "dist"

# SPA simple: cualquier ruta sirve el index (el Módulo Instalaciones es una pestaña).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
